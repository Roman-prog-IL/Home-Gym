<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym OS Pro</title>
    <style>
        :root {
            --bg: #070b14;
            --card: #151c2c;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px 20px 120px 20px;
            -webkit-font-smoothing: antialiased;
        }

        header { margin-bottom: 30px; margin-top: 10px; }
        .date { color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
        h1 { font-size: 34px; margin: 5px 0; font-weight: 800; letter-spacing: -1px; }

        /* Сетка упражнений */
        .grid { display: grid; gap: 16px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card:active { transform: scale(0.98); }

        .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .ex-name { font-size: 20px; font-weight: 700; display: block; }
        .ex-meta { font-size: 13px; color: var(--text-dim); display: block; margin-top: 4px; }

        /* Индикатор подходов */
        .sets-wrapper { display: flex; gap: 10px; align-items: center; }
        .set-node {
            width: 14px; height: 14px; border-radius: 4px;
            background: rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .set-node.active { 
            background: var(--success); 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); 
            transform: scale(1.1);
        }

        /* Кнопка + */
        .add-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none; width: 54px; height: 54px; border-radius: 18px;
            color: white; font-size: 28px; font-weight: 300;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .add-btn:disabled { background: #2d3748; box-shadow: none; opacity: 0.5; }

        /* Плавающий Таймер */
        #rest-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(59, 130, 246, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px; border-radius: 40px;
            display: none; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            z-index: 1000; border: 1px solid rgba(255,255,255,0.2);
        }
        .timer-ring { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; }

        /* Спец-карточка Дорожка */
        .treadmill { border-bottom: 4px solid var(--warning); }
        .tread-stats { display: flex; justify-content: space-between; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 700; color: var(--warning); }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        /* Кнопка сброса */
        .reset-btn {
            margin-top: 40px; background: transparent; border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim); padding: 12px; width: 100%; border-radius: 15px; font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <div class="date" id="date-string">7 марта / Суббота</div>
    <h1>Тренировка А</h1>
</header>

<div id="rest-overlay">
    <div style="text-align: left;">
        <div style="font-size: 10px; opacity: 0.8; font-weight: bold;">ОТДЫХ</div>
        <div class="timer-ring"><span id="timer-sec">60</span><span style="font-size: 14px; opacity: 0.7;"> сек</span></div>
    </div>
    <button onclick="stopRest()" style="background: rgba(0,0,0,0.2); border: none; color: white; padding: 8px 12px; border-radius: 10px; font-size: 12px;">Пропустить</button>
</div>

<div class="grid" id="exercises-list">
    </div>

<button class="reset-btn" onclick="resetAll()">Сбросить прогресс тренировки</button>

<script>
    const exercises = [
        { id: 0, name: 'Брусья', goal: '5 подходов по 12 раз', sets: 5, color: '#3b82f6' },
        { id: 1, name: 'Турник', goal: '4 подхода по 8 раз', sets: 4, color: '#f97316' },
        { id: 2, name: 'Отжимания', goal: '4 подхода по 20 раз', sets: 4, color: '#10b981' },
        { id: 3, name: 'Пресс (Колесо)', goal: '4 подхода по 15 раз', sets: 4, color: '#8b5cf6' }
    ];

    let state = JSON.parse(localStorage.getItem('gym_pro_state')) || [0, 0, 0, 0];
    let timer;

    function init() {
        const d = new Date();
        const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        document.getElementById('date-string').innerText = `${d.getDate()} ${months[d.getMonth()]} / ${days[d.getDay()]}`;

        const list = document.getElementById('exercises-list');
        list.innerHTML = exercises.map((ex, idx) => `
            <div class="card" style="border-left: 4px solid ${ex.color}">
                <div class="ex-header">
                    <div>
                        <span class="ex-name">${ex.name}</span>
                        <span class="ex-meta">${ex.goal}</span>
                    </div>
                    <button class="add-btn" id="btn-${idx}" onclick="completeSet(${idx})">+</button>
                </div>
                <div class="sets-wrapper" id="sets-${idx}">
                    ${Array(ex.sets).fill().map((_, i) => `<div class="set-node ${i < state[idx] ? 'active' : ''}"></div>`).join('')}
                </div>
            </div>
        `).join('') + `
            <div class="card treadmill">
                <span class="ex-name">Беговая дорожка</span>
                <span class="ex-meta">LISS Кардио после силовой</span>
                <div class="tread-stats">
                    <div class="stat-item"><span class="stat-val">6.5</span><span class="stat-lab">км/ч</span></div>
                    <div class="stat-item"><span class="stat-val">130</span><span class="stat-lab">пульс</span></div>
                    <div class="stat-item"><span class="stat-val">20</span><span class="stat-lab">мин</span></div>
                </div>
            </div>
        `;
    }

    function completeSet(idx) {
        if (state[idx] < exercises[idx].sets) {
            state[idx]++;
            save();
            render();
            startRest();
            
            // Вибрация на iPhone при нажатии
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }
    }

    function startRest() {
        clearInterval(timer);
        const overlay = document.getElementById('rest-overlay');
        const display = document.getElementById('timer-sec');
        let timeLeft = 60;

        overlay.style.display = 'flex';
        display.innerText = timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if (timeLeft <= 0) {
                stopRest();
                // Финальный вибросигнал
                if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
            }
        }, 1000);
    }

    function stopRest() {
        clearInterval(timer);
        document.getElementById('rest-overlay').style.display = 'none';
    }

    function save() { localStorage.setItem('gym_pro_state', JSON.stringify(state)); }
    function render() { init(); }
    function resetAll() { if(confirm('Сбросить прогресс?')) { state = [0,0,0,0]; save(); render(); } }

    init();
</script>

</body>
</html>
