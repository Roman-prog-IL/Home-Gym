<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Home Gym</title>
    <meta name="apple-mobile-web-app-title" content="Home Gym">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f0f10; 
            --card: #1c1c1e; 
            --accent: #32d74b; 
            --blue: #0a84ff;
            --text-dim: #8e8e93;
        }
        
        body { 
            background: var(--bg); color: white; 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px 16px 160px;
            -webkit-user-select: none;
        }

        .app-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-logo {
            width: 55px; height: 55px; border-radius: 14px;
            background: url('icon.png') center/cover;
            background-color: #2c2c2e;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .quote-box {
            background: rgba(50, 215, 75, 0.05);
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 14px;
            color: #d1d1d6;
        }

        .week-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; 
            margin-bottom: 20px; background: var(--card); padding: 12px; border-radius: 20px;
        }
        .day-box { 
            height: 40px; border-radius: 12px; background: #2c2c2e; 
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }
        .day.active .day-box { background: var(--accent); color: black; }

        .ex-card, .analytics-box, .weight-card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* Крупные заголовки для инвентаря */
        .category-title { color: var(--accent); font-size: 24px; font-weight: 900; margin-bottom: 15px; letter-spacing: -0.5px; }
        .weight-title { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }

        .chart-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .nav-btn { flex: 1; background: #2c2c2e; border: none; color: var(--text-dim); padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .nav-btn.active { background: var(--blue); color: white; }

        .input-row { display: flex; justify-content: space-between; align-items: center; }
        
        /* Слово подход поменьше */
        .ex-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }

        input { 
            background: #2c2c2e; border: 1px solid #3a3a3c; color: white; 
            width: 70px; padding: 12px; border-radius: 14px; text-align: center; font-size: 20px; font-weight: 700;
        }
        .add-btn { 
            background: var(--blue); border: none; color: white; 
            width: 50px; height: 50px; border-radius: 14px; font-size: 24px; font-weight: bold; margin-left: 10px;
        }

        .sets-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .pill { background: rgba(50, 215, 75, 0.1); color: var(--accent); padding: 8px 15px; border-radius: 10px; font-size: 16px; font-weight: 700; }

        .controls-row { position: fixed; bottom: 30px; left: 16px; right: 16px; display: flex; gap: 12px; z-index: 100; }
        .timer-btn { flex: 1; padding: 22px; border-radius: 20px; border: none; font-weight: 800; font-size: 15px; }
        #rest-btn { background: var(--blue); color: white; }
        #plank-btn { background: var(--accent); color: black; }
        .t-active { background: #ff453a !important; color: white; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-logo"></div>
    <div>
        <h1 style="margin:0; font-size:22px; letter-spacing:-0.5px;">Home Gym</h1>
        <p style="margin:0; font-size:11px; color:var(--accent); font-weight:700;">ELITE TRACKER</p>
    </div>
</div>

<div class="quote-box" id="motivation-quote">Загрузка мотивации...</div>

<div class="weight-card">
    <div class="weight-title">Вес Тела</div>
    <div class="input-row">
        <div id="display-weight" style="font-size: 26px; font-weight: 900;">-- кг</div>
        <div id="weight-input-area">
            <input type="number" id="in-weight" step="0.1" placeholder="0.0" inputmode="decimal">
            <button class="add-btn" onclick="saveWeight()">OK</button>
        </div>
    </div>
</div>

<div class="week-grid" id="calendar"></div>
<div id="exercise-list"></div>

<div class="analytics-box">
    <div class="weight-title">Прогресс</div>
    <div class="chart-nav">
        <button class="nav-btn active" onclick="switchChart('pull', this)">Турник</button>
        <button class="nav-btn" onclick="switchChart('dip', this)">Брусья</button>
        <button class="nav-btn" onclick="switchChart('push', this)">Отжим</button>
        <button class="nav-btn" onclick="switchChart('abs', this)">Пресс</button>
    </div>
    <div style="height:180px;">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<div class="controls-row">
    <button class="timer-btn" id="rest-btn" onclick="toggleRest()">ОТДЫХ 60с</button>
    <button class="timer-btn" id="plank-btn" onclick="togglePlank()">ПЛАНКА: <span id="p-val">0</span>с</button>
</div>

<script>
    const quotes = [
        "Твоё тело может всё. Главное — убедить в этом свой разум.",
        "Либо ты управляешь своим днем, либо день управляет тобой.",
        "Дисциплина — это делать то, что нужно, когда не хочется.",
        "Тяжело сейчас — легко на пляже.",
        "Единственная плохая тренировка — та, которой не было.",
        "Успех — это сумма маленьких усилий, повторяющихся изо дня в день.",
        "Не останавливайся, когда устал. Останавливайся, когда закончил.",
        "Сила не в мышцах, сила в характере.",
        "Твои результаты зависят только от твоих действий.",
        "Завтра ты скажешь себе спасибо за то, что не сдался сегодня."
    ];

    const exercises = [
        { id: 'pull', name: 'Турник' },
        { id: 'dip', name: 'Брусья' },
        { id: 'push', name: 'Отжимания' },
        { id: 'abs', name: 'Пресс' }
    ];

    // Используем v28 для чистоты данных
    let db = JSON.parse(localStorage.getItem('homegym_db_v28')) || {};
    let today = new Date().toISOString().split('T')[0];
    let viewingDate = today;
    let chartInstance;
    let currentChartId = 'pull';

    function init() { 
        document.getElementById('motivation-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        renderCalendar(); 
        renderWeight();
        renderExercises(); 
        updateChart(); 
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const now = new Date(); cal.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(now.getDate() - now.getDay() + i);
            let key = d.toISOString().split('T')[0];
            cal.innerHTML += `<div class="day ${key === viewingDate ? 'active' : ''}" onclick="changeDate('${key}')">
                <div style="font-size:10px; color:var(--text-dim); text-align:center; margin-bottom:4px;">${days[i]}</div>
                <div class="day-box">${d.getDate()}</div>
            </div>`;
        }
    }

    function renderWeight() {
        const val = db[viewingDate]?.weight || '--';
        document.getElementById('display-weight').innerText = `${val} кг`;
        document.getElementById('weight-input-area').style.display = viewingDate === today ? 'flex' : 'none';
    }

    function saveWeight() {
        const val = parseFloat(document.getElementById('in-weight').value);
        if(!val) return;
        if(!db[today]) db[today] = {};
        db[today].weight = val;
        localStorage.setItem('homegym_db_v28', JSON.stringify(db));
        document.getElementById('in-weight').value = '';
        renderWeight();
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = exercises.map(ex => {
            const sets = (db[viewingDate] && db[viewingDate][ex.id]) || [];
            return `
                <div class="ex-card">
                    <div class="category-title">${ex.name}</div>
                    <div class="input-row">
                        <div class="ex-label">подход</div>
                        ${viewingDate === today ? `
                            <div style="display:flex;">
                                <input type="number" id="in-${ex.id}" placeholder="0" inputmode="numeric">
                                <button class="add-btn" onclick="addSet('${ex.id}')">+</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="sets-container">
                        ${sets.map(s => `<div class="pill">${s}</div>`).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function changeDate(key) { viewingDate = key; renderCalendar(); renderWeight(); renderExercises(); }

    function addSet(id) {
        const el = document.getElementById(`in-${id}`);
        const val = parseInt(el.value);
        if(!val) return;
        if(!db[today]) db[today] = {};
        if(!db[today][id]) db[today][id] = [];
        db[today][id].push(val);
        localStorage.setItem('homegym_db_v28', JSON.stringify(db));
        el.value = '';
        renderExercises(); updateChart();
    }

    function switchChart(id, btn) {
        currentChartId = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = [];
        const data = [];
        for(let i=6; i>=0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let k = d.toISOString().split('T')[0];
            labels.push(d.getDate());
            const dayData = db[k] && db[k][currentChartId] ? Math.max(...db[k][currentChartId]) : 0;
            data.push(dayData);
        }

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ data, borderColor: '#32d74b', tension: 0.4, fill: true, backgroundColor: 'rgba(50, 215, 75, 0.1)', borderWidth: 3, pointRadius: 4 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#2c2c2e' }, ticks: { color: '#8e8e93' } }, x: { grid: { display: false }, ticks: { color: '#8e8e93' } } } }
        });
    }

    let rTime = 60, restId;
    function toggleRest() {
        const btn = document.getElementById('rest-btn');
        if(restId) { clearInterval(restId); restId = null; btn.innerText = "ОТДЫХ 60с"; rTime = 60; btn.classList.remove('t-active'); }
        else { 
            btn.classList.add('t-active');
            restId = setInterval(() => { rTime--; btn.innerText = `ПАУЗА ${rTime}с`; if(rTime<=0) toggleRest(); }, 1000); 
        }
    }

    let pTime = 0, plankId;
    function togglePlank() {
        const btn = document.getElementById('plank-btn');
        if(plankId) { 
            clearInterval(plankId); 
            plankId = null; 
            btn.classList.remove('t-active'); 
            if(pTime > 0) {
                if(!db[today]) db[today] = {};
                if(!db[today]['abs']) db[today]['abs'] = [];
                db[today]['abs'].push(pTime);
                localStorage.setItem('homegym_db_v28', JSON.stringify(db));
                renderExercises(); updateChart();
            }
            pTime = 0; document.getElementById('p-val').innerText = 0;
        }
        else { 
            btn.classList.add('t-active'); 
            plankId = setInterval(() => { pTime++; document.getElementById('p-val').innerText = pTime; }, 1000); 
        }
    }

    init();
</script>
</body>
</html>
