<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Pro: Multi-Grip</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #3b82f6; --success: #10b981; --text-dim: #6b7280; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px 20px 140px; }
        
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 25px; background: var(--card); padding: 15px; border-radius: 20px; }
        .day { text-align: center; cursor: pointer; opacity: 0.4; }
        .day.active { opacity: 1; }
        .day-box { height: 35px; border-radius: 10px; background: #1f2937; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 5px; }
        .day.active .day-box { background: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .ex-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .category-title { color: var(--accent); font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        .type-selector { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .type-btn { background: #1f2937; border: 1px solid #374151; color: white; padding: 6px 12px; border-radius: 10px; font-size: 11px; white-space: nowrap; }
        .type-btn.active { background: var(--accent); border-color: var(--accent); }

        .ex-header { display: flex; justify-content: space-between; align-items: center; }
        .input-group { display: flex; gap: 8px; }
        input { background: #1f2937; border: 1px solid #374151; color: white; width: 50px; padding: 10px; border-radius: 12px; text-align: center; font-size: 16px; }
        .add-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 12px; font-weight: bold; }

        .history-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; min-height: 25px; }
        .pill { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 10px; font-size: 13px; font-weight: 800; border: 1px solid rgba(59, 130, 246, 0.2); }

        .analytics-box { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.1); }
        #timer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 15px 35px; border-radius: 50px; display: none; font-weight: 800; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="week-grid" id="calendar"></div>

<div id="exercise-list"></div>

<div class="analytics-box">
    <h3 style="margin: 0 0 15px 0; font-size: 13px; color: var(--text-dim);">ПРОГРЕСС (MAX ПОВТОРОВ)</h3>
    <canvas id="mainChart"></canvas>
</div>

<div id="timer">ОТДЫХ: <span id="t-val">60</span>с</div>

<script>
    const program = [
        { id: 'dip', name: 'Брусья', types: ['Классика'] },
        { id: 'pull', name: 'Турник', types: ['Широкий', 'Узкий (Бицепс)', 'Параллельный'] },
        { id: 'push', name: 'Отжимания', types: ['Классика', 'Алмазные', 'Домиком (Плечи)'] },
        { id: 'abs', name: 'Пресс', types: ['Колесо', 'Подъем ног'] }
    ];

    let db = JSON.parse(localStorage.getItem('gym_v5_db')) || {};
    let selectedTypes = JSON.parse(localStorage.getItem('gym_v5_selected')) || { dip: 'Классика', pull: 'Широкий', push: 'Классика', abs: 'Колесо' };
    let today = new Date().toISOString().split('T')[0];
    let viewingDate = today;
    let chartInstance;

    function init() {
        renderCalendar();
        renderExercises();
        updateChart();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const now = new Date();
        cal.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(now.getDate() - now.getDay() + i);
            let key = d.toISOString().split('T')[0];
            cal.innerHTML += `<div class="day ${key === viewingDate ? 'active' : ''}" onclick="changeDate('${key}')"><div class="day-name">${days[i]}</div><div class="day-box">${d.getDate()}</div></div>`;
        }
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = program.map(ex => {
            const currentType = selectedTypes[ex.id];
            const storageKey = `${ex.id}_${currentType}`;
            const sets = (db[viewingDate] && db[viewingDate][storageKey]) || [];
            
            return `
                <div class="ex-card">
                    <div class="category-title">${ex.name}</div>
                    <div class="type-selector">
                        ${ex.types.map(t => `<button class="type-btn ${t === currentType ? 'active' : ''}" onclick="setType('${ex.id}', '${t}')">${t}</button>`).join('')}
                    </div>
                    <div class="ex-header">
                        <div style="font-size:14px; font-weight:bold;">${currentType}</div>
                        ${viewingDate === today ? `
                        <div class="input-group">
                            <input type="number" id="in-${ex.id}" placeholder="0" inputmode="numeric">
                            <button class="add-btn" onclick="addSet('${ex.id}')">+</button>
                        </div>` : ''}
                    </div>
                    <div class="history-pills">${sets.map(s => `<div class="pill">${s}</div>`).join('') || '<span style="color:#374151; font-size:12px;">Нет подходов</span>'}</div>
                </div>`;
        }).join('');
    }

    function setType(exId, type) {
        selectedTypes[exId] = type;
        localStorage.setItem('gym_v5_selected', JSON.stringify(selectedTypes));
        renderExercises();
        updateChart();
    }

    function addSet(exId) {
        const inp = document.getElementById(`in-${exId}`);
        const val = parseInt(inp.value);
        if(!val) return;

        const storageKey = `${exId}_${selectedTypes[exId]}`;
        if(!db[today]) db[today] = {};
        if(!db[today][storageKey]) db[today][storageKey] = [];
        
        db[today][storageKey].push(val);
        localStorage.setItem('gym_v5_db', JSON.stringify(db));
        
        inp.value = '';
        renderExercises();
        updateChart();
        startTimer();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const activeExId = 'pull'; // По умолчанию показываем Турник на графике
        const activeType = selectedTypes[activeExId];
        const storageKey = `${activeExId}_${activeType}`;

        const labels = Object.keys(db).sort().slice(-7);
        const dataPoints = labels.map(date => {
            const dayData = db[date][storageKey] || [];
            return dayData.length > 0 ? Math.max(...dayData) : 0;
        });

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.map(l => l.split('-')[2]),
                datasets: [{
                    label: activeType,
                    data: dataPoints,
                    borderColor: '#3b82f6',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    pointRadius: 4
                }]
            },
            options: { plugins: { legend: { display: true, labels: { color: '#6b7280', font: { size: 10 } } } } }
        });
    }

    function changeDate(key) { viewingDate = key; renderCalendar(); renderExercises(); }

    let tId;
    function startTimer() {
        clearInterval(tId);
        const bar = document.getElementById('timer');
        const val = document.getElementById('t-val');
        let l = 60; bar.style.display = 'block'; val.innerText = l;
        tId = setInterval(() => {
            l--; val.innerText = l;
            if(l<=0) { clearInterval(tId); bar.style.display='none'; }
        }, 1000);
    }

    init();
</script>
</body>
</html>
