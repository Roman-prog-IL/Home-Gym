<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Pro: Full System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #3b82f6; --success: #10b981; --text-dim: #6b7280; --error: #ef4444; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px 20px 180px; }
        
        /* Календарь */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 20px; }
        .day { text-align: center; cursor: pointer; opacity: 0.4; }
        .day.active { opacity: 1; }
        .day-box { height: 35px; border-radius: 10px; background: #1f2937; display: flex; align-items: center; justify-content: center; font-size: 13px; margin-top: 5px; font-weight: bold; }
        .day.active .day-box { background: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .ex-card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .category-title { color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        
        .type-selector { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; scrollbar-width: none; }
        .type-btn { background: #1f2937; border: none; color: var(--text-dim); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .type-btn.active { background: var(--accent); color: white; }

        .ex-header { display: flex; justify-content: space-between; align-items: center; }
        input { background: #1f2937; border: 1px solid #374151; color: white; width: 50px; padding: 10px; border-radius: 12px; text-align: center; font-size: 16px; }
        .add-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 12px; font-weight: bold; font-size: 20px; }

        .history-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; min-height: 20px; }
        .pill { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid rgba(59, 130, 246, 0.2); }

        /* Аналитика */
        .analytics-box { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .chart-menu { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; scrollbar-width: none; }
        .menu-btn { background: #1f2937; border: none; color: var(--text-dim); padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .menu-btn.active { background: var(--accent); color: white; }

        /* Таймеры внизу */
        .controls-row { position: fixed; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .timer-btn { flex: 1; padding: 15px; border-radius: 18px; border: none; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 14px; }
        #rest-btn { background: var(--accent); }
        #plank-btn { background: var(--success); }
        .t-active { animation: pulse 1s infinite; background: var(--error) !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="week-grid" id="calendar"></div>

<div id="exercise-list"></div>

<div class="analytics-box">
    <div class="chart-menu">
        <button class="menu-btn active" id="btn-chart-pull" onclick="setChartSource('pull')">Турник</button>
        <button class="menu-btn" id="btn-chart-dip" onclick="setChartSource('dip')">Брусья</button>
        <button class="menu-btn" id="btn-chart-push" onclick="setChartSource('push')">Отжим</button>
        <button class="menu-btn" id="btn-chart-abs" onclick="setChartSource('abs')">Пресс</button>
    </div>
    <canvas id="mainChart" height="180"></canvas>
</div>

<div class="controls-row">
    <button class="timer-btn" id="rest-btn" onclick="toggleRest()">ОТДЫХ: <span id="r-val">60</span>с</button>
    <button class="timer-btn" id="plank-btn" onclick="togglePlank()">ПЛАНКА: <span id="p-val">0</span>с</button>
</div>

<script>
    const program = [
        { id: 'dip', name: 'Брусья', types: ['Классика'] },
        { id: 'pull', name: 'Турник', types: ['Широкий', 'Узкий (Бицепс)', 'Параллельный'] },
        { id: 'push', name: 'Отжимания', types: ['Классика', 'Алмазные', 'Домиком'] },
        { id: 'abs', name: 'Пресс', types: ['Планка', 'Колесо', 'Подъем ног'] }
    ];

    let db = JSON.parse(localStorage.getItem('gym_v12_db')) || {};
    let selectedTypes = JSON.parse(localStorage.getItem('gym_v12_selected')) || { dip: 'Классика', pull: 'Широкий', push: 'Классика', abs: 'Планка' };
    let today = new Date().toISOString().split('T')[0];
    let viewingDate = today;
    let chartInstance, restId, plankId, rTime = 60, pTime = 0, currentChartSource = 'pull';

    function init() {
        renderCalendar();
        renderExercises();
        updateChart();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const now = new Date(); cal.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(now.getDate() - now.getDay() + i);
            let key = d.toISOString().split('T')[0];
            cal.innerHTML += `<div class="day ${key === viewingDate ? 'active' : ''}" onclick="changeDate('${key}')"><div class="day-name">${days[i]}</div><div class="day-box">${d.getDate()}</div></div>`;
        }
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = program.map(ex => {
            const currentType = selectedTypes[ex.id];
            const key = `${ex.id}_${currentType}`;
            const sets = (db[viewingDate] && db[viewingDate][key]) || [];
            return `<div class="ex-card">
                <div class="category-title">${ex.name}</div>
                <div class="type-selector">${ex.types.map(t => `<button class="type-btn ${t === currentType ? 'active' : ''}" onclick="setType('${ex.id}', '${t}')">${t}</button>`).join('')}</div>
                <div class="ex-header">
                    <div style="font-size:16px; font-weight:bold;">${currentType}</div>
                    ${viewingDate === today ? `<div class="input-group"><input type="number" id="in-${ex.id}" placeholder="0" inputmode="numeric"><button class="add-btn" onclick="addSet('${ex.id}')">+</button></div>` : ''}
                </div>
                <div class="history-pills">${sets.map(s => `<div class="pill">${s}${currentType==='Планка'?'с':''}</div>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function changeDate(key) { viewingDate = key; renderCalendar(); renderExercises(); updateChart(); }
    function setType(exId, type) { selectedTypes[exId] = type; localStorage.setItem('gym_v12_selected', JSON.stringify(selectedTypes)); renderExercises(); updateChart(); }

    function addSet(exId, manualVal = null) {
        const val = manualVal || parseInt(document.getElementById(`in-${exId}`).value);
        if(!val) return;
        const key = `${exId}_${selectedTypes[exId]}`;
        if(!db[today]) db[today] = {};
        if(!db[today][key]) db[today][key] = [];
        db[today][key].push(val);
        localStorage.setItem('gym_v12_db', JSON.stringify(db));
        if(!manualVal) document.getElementById(`in-${exId}`).value = '';
        renderExercises(); updateChart();
    }

    function setChartSource(src) { currentChartSource = src; document.querySelectorAll('.menu-btn').forEach(b => b.classList.toggle('active', b.id === `btn-chart-${src}`)); updateChart(); }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const last7 = []; for(let i=6; i>=0; i--) { let d=new Date(); d.setDate(d.getDate()-i); last7.push(d.toISOString().split('T')[0]); }
        let data = last7.map(date => {
            const key = `${currentChartSource}_${selectedTypes[currentChartSource]}`;
            const dayData = (db[date] && db[date][key]) || [];
            return dayData.length > 0 ? Math.max(...dayData) : 0;
        });
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: last7.map(d=>d.split('-')[2]), datasets: [{ data: data, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, spanGaps: true }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280' } }, x: { grid: { display: false }, ticks: { color: '#6b7280' } } } }
        });
    }

    function toggleRest() {
        clearInterval(restId); const btn = document.getElementById('rest-btn');
        if(btn.classList.contains('t-active')) { btn.classList.remove('t-active'); rTime = 60; document.getElementById('r-val').innerText = 60; }
        else { btn.classList.add('t-active'); restId = setInterval(() => { rTime--; document.getElementById('r-val').innerText = rTime; if(rTime <= 0) toggleRest(); }, 1000); }
    }

    function togglePlank() {
        const btn = document.getElementById('plank-btn');
        if(btn.classList.contains('t-active')) {
            clearInterval(plankId); btn.classList.remove('t-active');
            if(pTime > 0) { selectedTypes.abs = 'Планка'; addSet('abs', pTime); }
            pTime = 0; document.getElementById('p-val').innerText = 0;
        } else {
            btn.classList.add('t-active'); plankId = setInterval(() => { pTime++; document.getElementById('p-val').innerText = pTime; }, 1000);
        }
    }

    init();
</script>
</body>
</html>
