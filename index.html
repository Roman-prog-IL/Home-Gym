<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Home Gym</title>
    <meta name="apple-mobile-web-app-title" content="Home Gym">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/9986pYm/gym-icon.png?v=2">
    <link rel="icon" href="https://i.ibb.co/9986pYm/gym-icon.png?v=2">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #2c2c2e; 
            --card: #3a3a3c; 
            --accent: #32d74b; 
            --blue: #0a84ff;
        }
        
        body { 
            background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 20px 16px 160px;
        }

        /* Светлый логотип внутри */
        .app-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .app-logo {
            width: 55px; height: 55px; border-radius: 14px;
            background: url('https://i.ibb.co/9986pYm/gym-icon.png') center/cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .week-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; 
            margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px;
        }
        .day-box { 
            height: 40px; border-radius: 10px; background: var(--card); 
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }
        .day.active .day-box { background: var(--accent); color: black; }

        .ex-card, .analytics-box { 
            background: var(--card); border-radius: 22px; padding: 18px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .category-title { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        
        .type-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; margin-right: 5px;
        }
        .type-btn.active { background: var(--blue); }

        input { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            width: 60px; padding: 12px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;
        }
        .add-btn { 
            background: var(--blue); border: none; color: white; 
            width: 48px; height: 48px; border-radius: 12px; font-size: 24px; font-weight: bold;
        }

        .pill { background: rgba(255, 255, 255, 0.15); padding: 6px 12px; border-radius: 8px; font-size: 14px; margin: 4px; display: inline-block; }

        .controls-row { position: fixed; bottom: 30px; left: 16px; right: 16px; display: flex; gap: 12px; }
        .timer-btn { flex: 1; padding: 22px; border-radius: 20px; border: none; font-weight: 800; font-size: 15px; }
        #rest-btn { background: var(--blue); color: white; }
        #plank-btn { background: var(--accent); color: black; }
        .t-active { background: #ff453a !important; color: white; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-logo"></div>
    <div>
        <h1 style="margin:0; font-size:24px;">Home Gym</h1>
        <p style="margin:0; font-size:11px; color:var(--accent); font-weight:700;">WORKOUT TRACKER</p>
    </div>
</div>

<div class="week-grid" id="calendar"></div>
<div id="exercise-list"></div>

<div class="analytics-box">
    <div class="category-title">Прогресс (Турник)</div>
    <div class="chart-container" style="height:180px;">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<div class="controls-row">
    <button class="timer-btn" id="rest-btn" onclick="toggleRest()">ОТДЫХ 60с</button>
    <button class="timer-btn" id="plank-btn" onclick="togglePlank()">ПЛАНКА: <span id="p-val">0</span>с</button>
</div>

<script>
    // Функционал полностью сохранен из предыдущей версии
    const program = [
        { id: 'pull', name: 'Турник', types: ['Широкий', 'Узкий', 'Бицепс'] },
        { id: 'dip', name: 'Брусья', types: ['Классика'] },
        { id: 'push', name: 'Отжимания', types: ['Классика', 'Алмазные'] },
        { id: 'abs', name: 'Пресс', types: ['Планка', 'Колесо'] }
    ];

    let db = JSON.parse(localStorage.getItem('homegym_db')) || {};
    let selectedTypes = { pull: 'Широкий', dip: 'Классика', push: 'Классика', abs: 'Планка' };
    let today = new Date().toISOString().split('T')[0];
    let viewingDate = today;
    let chartInstance, restId, plankId, rTime = 60, pTime = 0;

    function init() { renderCalendar(); renderExercises(); updateChart(); }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const now = new Date(); cal.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(now.getDate() - now.getDay() + i);
            let key = d.toISOString().split('T')[0];
            cal.innerHTML += `<div class="day ${key === viewingDate ? 'active' : ''}" onclick="changeDate('${key}')" style="text-align:center;">
                <div style="font-size:10px; opacity:0.6; margin-bottom:4px;">${days[i]}</div>
                <div class="day-box">${d.getDate()}</div>
            </div>`;
        }
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = program.map(ex => {
            const type = selectedTypes[ex.id];
            const sets = (db[viewingDate] && db[viewingDate][`${ex.id}_${type}`]) || [];
            return `<div class="ex-card">
                <div class="category-title">${ex.name}</div>
                <div style="margin-bottom:12px; overflow-x:auto; white-space:nowrap;">
                    ${ex.types.map(t => `<button class="type-btn ${t === type ? 'active' : ''}" onclick="setType('${ex.id}', '${t}')">${t}</button>`).join('')}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:20px; font-weight:800;">${type}</div>
                    ${viewingDate === today ? `<div><input type="number" id="in-${ex.id}" placeholder="0"><button class="add-btn" style="margin-left:10px" onclick="addSet('${ex.id}')">+</button></div>` : ''}
                </div>
                <div style="margin-top:12px;">${sets.map(s => `<span class="pill">${s}</span>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function changeDate(key) { viewingDate = key; renderCalendar(); renderExercises(); updateChart(); }
    function setType(id, t) { selectedTypes[id] = t; renderExercises(); updateChart(); }

    function addSet(id) {
        const val = parseInt(document.getElementById(`in-${id}`).value);
        if(!val) return;
        const key = `${id}_${selectedTypes[id]}`;
        if(!db[today]) db[today] = {};
        if(!db[today][key]) db[today][key] = [];
        db[today][key].push(val);
        localStorage.setItem('homegym_db', JSON.stringify(db));
        document.getElementById(`in-${id}`).value = '';
        renderExercises(); updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = [];
        for(let i=6; i>=0; i--) { let d=new Date(); d.setDate(d.getDate()-i); labels.push(d.toISOString().split('T')[0]); }
        const data = labels.map(d => (db[d] && db[d][`pull_${selectedTypes.pull}`]) ? Math.max(...db[d][`pull_${selectedTypes.pull}`]) : 0);
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ data, borderColor: '#32d74b', tension: 0.4, fill: true, backgroundColor: 'rgba(50, 215, 75, 0.1)' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#8e8e93' } } } }
        });
    }

    function toggleRest() {
        clearInterval(restId); const btn = document.getElementById('rest-btn');
        if(btn.classList.contains('t-active')) { btn.classList.remove('t-active'); rTime = 60; btn.innerText = "ОТДЫХ 60с"; }
        else { btn.classList.add('t-active'); restId = setInterval(() => { rTime--; btn.innerText = `ОТДЫХ ${rTime}с`; if(rTime <= 0) toggleRest(); }, 1000); }
    }

    function togglePlank() {
        const btn = document.getElementById('plank-btn');
        if(btn.classList.contains('t-active')) { clearInterval(plankId); btn.classList.remove('t-active'); pTime = 0; }
        else { btn.classList.add('t-active'); plankId = setInterval(() => { pTime++; document.getElementById('p-val').innerText = pTime; }, 1000); }
    }
    init();
</script>
</body>
</html>
