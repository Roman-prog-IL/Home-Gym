<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Analytics Pro</title>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #3b82f6; --success: #10b981; --text-dim: #6b7280; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px 20px 120px; }
        
        /* Календарь */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 25px; background: var(--card); padding: 15px; border-radius: 20px; }
        .day { text-align: center; cursor: pointer; }
        .day-name { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .day-box { height: 35px; border-radius: 10px; background: #1f2937; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 5px; }
        .day.active .day-box { background: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        /* Карточки */
        .ex-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h2 { margin: 0; font-size: 18px; letter-spacing: -0.5px; }
        
        .history-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; min-height: 20px; }
        .pill { background: #1f2937; color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid rgba(59, 130, 246, 0.2); }

        /* Ввод */
        .input-group { display: flex; gap: 10px; align-items: center; }
        input { background: #1f2937; border: 1px solid #374151; color: white; width: 50px; padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: bold; }
        .add-btn { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 12px; font-size: 20px; font-weight: bold; }

        /* Таймер */
        #timer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 12px 30px; border-radius: 50px; display: none; font-weight: bold; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="week-grid" id="calendar"></div>

<header style="margin-bottom: 20px;">
    <h1 id="view-date" style="font-size: 24px; margin: 0;">Сегодня</h1>
    <p style="color: var(--text-dim); font-size: 14px; margin: 5px 0;">Записывай каждый подход</p>
</header>

<div id="exercise-list"></div>

<div id="timer">ОТДЫХ: <span id="t-val">60</span>с</div>

<script>
    const exercises = ['Брусья', 'Турник', 'Отжимания', 'Пресс'];
    let db = JSON.parse(localStorage.getItem('gym_db_v3')) || {};
    let today = new Date().toISOString().split('T')[0];
    let viewingDate = today;

    function init() {
        renderCalendar();
        renderExercises();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const now = new Date();
        cal.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(now.getDate() - now.getDay() + i);
            let key = d.toISOString().split('T')[0];
            cal.innerHTML += `
                <div class="day ${key === viewingDate ? 'active' : ''}" onclick="changeDate('${key}')">
                    <div class="day-name">${days[i]}</div>
                    <div class="day-box">${d.getDate()}</div>
                </div>`;
        }
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        const data = db[viewingDate] || {};
        list.innerHTML = exercises.map(ex => {
            const sets = data[ex] || [];
            return `
                <div class="ex-card">
                    <div class="ex-header">
                        <h2>${ex}</h2>
                        ${viewingDate === today ? `
                        <div class="input-group">
                            <input type="number" id="in-${ex}" placeholder="0" inputmode="numeric">
                            <button class="add-btn" onclick="addSet('${ex}')">+</button>
                        </div>` : ''}
                    </div>
                    <div class="history-pills">
                        ${sets.map(s => `<div class="pill">${s}</div>`).join('') || '<span style="color:#374151; font-size:12px;">Нет записей</span>'}
                    </div>
                </div>`;
        }).join('');
    }

    function addSet(name) {
        const inp = document.getElementById(`in-${name}`);
        const val = parseInt(inp.value);
        if(!val) return;

        if(!db[today]) db[today] = {};
        if(!db[today][name]) db[today][name] = [];
        
        db[today][name].push(val);
        localStorage.setItem('gym_db_v3', JSON.stringify(db));
        
        inp.value = '';
        renderExercises();
        startTimer();
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function changeDate(key) {
        viewingDate = key;
        document.getElementById('view-date').innerText = key === today ? 'Сегодня' : key;
        renderCalendar();
        renderExercises();
    }

    let tId;
    function startTimer() {
        clearInterval(tId);
        const bar = document.getElementById('timer');
        const val = document.getElementById('t-val');
        let l = 60; bar.style.display = 'block'; val.innerText = l;
        tId = setInterval(() => {
            l--; val.innerText = l;
            if(l<=0) { clearInterval(tId); bar.style.display='none'; if(window.navigator.vibrate) window.navigator.vibrate([100,50,100]); }
        }, 1000);
    }

    init();
</script>
</body>
</html>
